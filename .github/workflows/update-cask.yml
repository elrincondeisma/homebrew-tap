name: Update Cask

on:
  repository_dispatch:
    types: [update-cask]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update keypet.rb
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256: ${{ github.event.client_payload.sha256_arm64 }}
        run: |
          sed -i "s/^  version \".*\"/  version \"$VERSION\"/" Casks/keypet.rb
          sed -i "s/^  sha256 \".*\"/  sha256 \"$SHA256\"/" Casks/keypet.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/keypet.rb
          git commit -m "keypet ${{ github.event.client_payload.version }}"
          git push
