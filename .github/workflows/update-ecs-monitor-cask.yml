name: Update ECS Monitor Cask

on:
  repository_dispatch:
    types: [update-ecs-monitor-cask]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.TAP_TOKEN }}

      - name: Update ecs-monitor.rb
        env:
          VERSION: ${{ github.event.client_payload.version }}
          SHA256: ${{ github.event.client_payload.sha256_universal }}
        run: |
          sed -i "s/^  version \".*\"/  version \"$VERSION\"/" Casks/ecs-monitor.rb
          sed -i "s/^  sha256 \".*\"/  sha256 \"$SHA256\"/" Casks/ecs-monitor.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ecs-monitor.rb
          git commit -m "ecs-monitor ${{ github.event.client_payload.version }}"
          git push
